spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  main:
    banner-mode: off
  application:
    name: AskBox
  config:
    import: optional:file:.env[.properties]
  threads.virtual.enabled: true
  profiles:
    active: ${PROFILES:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:askbox}
    username: ${DB_USER:askbox}
    password: ${DB_PASSWORD:askbox}

  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    serialization.write-dates-as-timestamps: false


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      insert-strategy: not_null
      update-strategy: not_null
      where-strategy: not_null

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: -1
  active-timeout: 1296000
  auto-renew: true
  is-concurrent: true
  is-share: false
  max-login-count: 5
  overflow-logout-mode: KICKOUT
  is-read-header: true
  is-read-cookie: false
  is-read-body: false

springdoc:
  swagger-ui.path: /swagger-ui.html
  api-docs.path: /v3/api-docs

knife4j:
  enable: true
  setting.language: zh_cn

server.port: ${SERVER_PORT:8080}

askbox.rate-limit:
  key-prefix: askbox:ratelimit
  ip.capacity: 100
  ip.refill-tokens: 100
  ip.time-window-seconds: 60
  user.capacity: 50
  user.refill-tokens: 50
  user.time-window-seconds: 60
  ua.capacity: 80
  ua.refill-tokens: 80
  ua.time-window-seconds: 60
  custom.capacity: 60
  custom.refill-tokens: 60
  custom.time-window-seconds: 60

askbox.object-storage:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:askbox}
  secret-key: ${MINIO_SECRET_KEY:askbox-secret}
  bucket: ${MINIO_BUCKET:askbox-assets}
  region: ${MINIO_REGION:us-east-1}
  access-mode: ${MINIO_ACCESS_MODE:REDIRECT}
  presign-ttl-seconds: ${MINIO_PRESIGN_TTL_SECONDS:600}
  asset-cache-max-age-seconds: ${MINIO_ASSET_CACHE_MAX_AGE_SECONDS:31536000}

askbox.likes:
  cache-ttl-seconds: ${LIKE_CACHE_TTL_SECONDS:1800}
  sync-interval-ms: ${LIKE_SYNC_INTERVAL_MS:5000}
  sync-batch-size: ${LIKE_SYNC_BATCH_SIZE:200}

askbox.ai:
  enabled: ${AI_ENABLED:true}
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4.1-mini}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
  history-candidate-limit: ${AI_HISTORY_CANDIDATE_LIMIT:12}
  popular-example-limit: ${AI_POPULAR_EXAMPLE_LIMIT:8}
  rate-limit-capacity: ${AI_RATE_LIMIT_CAPACITY:20}
  rate-limit-window-seconds: ${AI_RATE_LIMIT_WINDOW_SECONDS:3600}
  circuit-breaker-seconds: ${AI_CIRCUIT_BREAKER_SECONDS:3600}
