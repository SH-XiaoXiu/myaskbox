<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,'Microsoft YaHei',sans-serif;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="padding:28px 30px 8px;">
              <h1 style="margin:0;font-size:22px;line-height:1.35;color:#111827;">{{title}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 30px 0;font-size:14px;line-height:1.8;color:#4b5563;">
              {{description}}
            </td>
          </tr>
          <tr>
            <td style="padding:22px 30px;">
              <div style="letter-spacing:8px;font-size:30px;font-weight:700;color:#111827;background:#f3f4f6;border-radius:10px;padding:18px 20px;text-align:center;">{{code}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 30px 28px;font-size:13px;line-height:1.7;color:#6b7280;">
              验证码 {{minutes}} 分钟内有效。如果不是你本人操作，请忽略这封邮件。
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
