services:
  postgres:
    image: postgres:17
    container_name: askbox-postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-askbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-askbox}
      POSTGRES_DB: ${DB_NAME:-askbox}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: askbox-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - ./data/redis:/data
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --save 60 1 --loglevel warning --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --save 60 1 --loglevel warning
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: askbox-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-askbox}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-askbox-secret}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
