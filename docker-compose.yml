services:
  postgres:
    image: postgres:17
    container_name: askbox-postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-askbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-askbox}
      POSTGRES_DB: ${DB_NAME:-askbox}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: askbox-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
